services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env
    command: npm run docker:start
  db:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=isaacddd
    volumes:
      - postgre-data:/var/lib/postgresql
volumes:
  postgre-data:
