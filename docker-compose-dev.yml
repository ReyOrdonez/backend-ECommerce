services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    command: >
      sh -c "npx prisma generate && npx prisma migrate dev && exec tsx watch src/server.ts"

  db:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=isaacddd
    volumes:
      - postgre-data:/var/lib/postgresql
volumes:
  postgre-data:
